<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sản phẩm - iPhone 16 Pro Max</title>
</head>
<body>

    <header>
        <svg width="100" height="40" viewBox="0 0 100 40" xmlns="http://www.w3.org/2000/svg">
            <rect x="5" y="5" width="30" height="30" fill="#2c3e50" rx="5" />
            <circle cx="20" cy="20" r="10" fill="#ecf0f1" />
            <text x="45" y="25" font-family="Arial" font-size="14" fill="#2c3e50">TECH</text>
        </svg>
        <h1>Siêu phẩm iPhone 16 Pro Max</h1>
    </header>

    <main>
        <section>
            <h2>Hình ảnh chi tiết</h2>
            
            <div style="display: flex; gap: 20px; flex-wrap: wrap;">
                <!-- Ảnh 1 -->
                <figure style="margin: 0; flex: 1; min-width: 250px;">
                    <img src="https://images.unsplash.com/photo-1727101569055-6679549f61b7?auto=format&fit=crop&q=80&w=800" 
                         alt="Mặt trước iPhone 16 Pro Max với màn hình Always-On và viền siêu mỏng" 
                         loading="lazy" 
                         style="max-width: 100%; height: auto; border-radius: 8px;">
                    <figcaption>Màn hình OLED tiến tiến nhất</figcaption>
                </figure>

                <!-- Ảnh 2 -->
                <figure style="margin: 0; flex: 1; min-width: 250px;">
                    <img src="https://images.unsplash.com/photo-1727299100346-6019b88412e6?auto=format&fit=crop&q=80&w=800" 
                         alt="Cụm 3 camera sau của iPhone 16 Pro Max được thiết kế tinh xảo" 
                         loading="lazy" 
                         style="max-width: 100%; height: auto; border-radius: 8px;">
                    <figcaption>Hệ thống Camera chuyên nghiệp 48MP</figcaption>
                </figure>

                <!-- Ảnh 3 -->
                <figure style="margin: 0; flex: 1; min-width: 250px;">
                    <img src="https://images.unsplash.com/photo-1727299100142-6cc335756461?auto=format&fit=crop&q=80&w=800" 
                         alt="Cạnh bên bằng chất liệu Titan Sa Mạc sang trọng" 
                         loading="lazy" 
                         style="max-width: 100%; height: auto; border-radius: 8px;">
                    <figcaption>Vỏ Titan cấp độ hàng không vũ trụ</figcaption>
                </figure>
            </div>
        </section>

        <hr>

        <!-- Phần Video -->
        <section>
            <h2>Video Review & Giới thiệu</h2>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <!-- Video nhúng YouTube -->
                <div>
                    <h3>Trải nghiệm thực tế (YouTube)</h3>
                    <iframe width="100%" height="315" 
                            src="https://www.youtube.com/embed/GDlkCkcIqTs" 
                            title="YouTube video player" 
                            frameborder="0" 
                            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                            allowfullscreen>
                    </iframe>
                </div>

                <div>
                    <h3>Video giới thiệu (Local)</h3>
                    <video controls poster="https://via.placeholder.com/600x340/000/fff?text=Click+to+Play+Video" 
                           style="width: 100%; height: auto;">
                        <source src="assets/videos/product-intro.webm" type="video/webm">
                        <source src="assets/videos/product-intro.mp4" type="video/mp4">
                        Trình duyệt của bạn không hỗ trợ thẻ video.
                    </video>
                </div>
            </div>
        </section>

        <hr>

        <section>
            <h2>Nhạc nền giới thiệu sản phẩm</h2>
            <p>Nghe nhạc nền đặc trưng của dòng sản phẩm mới:</p>
            <audio controls>
                <source src="assets/audio/product-theme.mp3" type="audio/mpeg">
                Trình duyệt của bạn không hỗ trợ thẻ audio.
            </audio>
        </section>
    </main>

    <footer style="margin-top: 50px; padding: 20px; background: #f4f4f4; text-align: center;">
        <p>&copy; 2026 Tech Store. All rights reserved.</p>
    </footer>

</body>
</html>
